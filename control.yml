- name: Setting up the control plane
  hosts: control
  become: true
  tasks:
    - name: Update the cache
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Initialize the control plane
      ansible.builtin.shell: >
        kubeadm init 
        --pod-network-cidr=10.200.0.0/16 
        --apiserver-advertise-address={{ ansible_default_ipv4.address }} 
        --skip-phases=addon/kube-proxy
      register: kubeadm_output
      args:
        creates: /etc/kubernetes/admin.conf
    
    - name: Create .kube directory for manabpokhrel7
      ansible.builtin.file:
        path: /home/manabpokhrel7/.kube
        state: directory
        owner: manabpokhrel7
        group: manabpokhrel7
        mode: '0755'
    
    - name: Copy admin.conf to user's kube config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/manabpokhrel7/.kube/config
        remote_src: yes
        owner: manabpokhrel7
        group: manabpokhrel7
        mode: '0600'

    - name: Also do this for normal users
      shell: |
         mkdir -p $HOME/.kube
         cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
         chown $(id -u):$(id -g) $HOME/.kube/config
      args:
        creates: $HOME/.kube/config

    - name: Print the join command
      command: kubeadm token create --print-join-command
      register: join_command

    - name: print the join command
      delegate_to: localhost
      become: false
      copy: 
        content: |
          #!/bin/bash 
          {{ join_command.stdout }}
        dest: join.sh
        mode: '0755'

    - name: Wait for kube-apiserver to be ready
      command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get --raw=/healthz
      register: healthz
      retries: 30
      delay: 5
      until: healthz.rc == 0

    - name: Install the cilium cli
      shell: |
        CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        CLI_ARCH=amd64
        if [ "$(uname -m)" = "aarch64" ]; then CLI_ARCH=arm64; fi
        curl -L --fail --remote-name-all https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz{,.sha256sum}
        sha256sum --check cilium-linux-${CLI_ARCH}.tar.gz.sha256sum
        tar xzvfC cilium-linux-${CLI_ARCH}.tar.gz /usr/local/bin
        rm cilium-linux-${CLI_ARCH}.tar.gz{,.sha256sum}
      args:
        creates: /usr/local/bin/cilium

    - name: Update the cache
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Add /usr/local/bin to sudo secure_path
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ansible_path
        # This appends /usr/local/bin to the standard search paths
        content: 'Defaults secure_path="/sbin:/bin:/usr/sbin:/usr/bin:/usr/local/bin"'
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Install cilium and Enable Hubble
      shell: |
        cilium install --version 1.19.3 --set ipam.mode=kubernetes --set kubeProxyReplacement=true
        cilium hubble enable
