- name: setting up kubernetes cluster with kubeadm and cilium CNS
  hosts: all
  become: true
  tasks:
    - name: Update the cache
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Comment out swap entry in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    - name: enable firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled 
      loop:
        - 8472/udp  
        - 4240/tcp  
        - 8080/tcp
        - 4244/tcp
        - 4245/tcp 
        - 4244/tcp
        - 6443/tcp
        - 10250/tcp
        - 30080/tcp #Required for cilium envoy we are using to route traffic
        - 9090/tcp #for prometheus
        - 3000/tcp #For grafana

    - name: Enable networking on kubernetes
      shell: |
        modprobe br_netfilter
        echo 'br_netfilter' | tee /etc/modules-load.d/br_netfilter.conf
        cat <<EOF | sudo tee /etc/sysctl.d/k8s.conf
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward = 1
        EOF
        sysctl --system

    - name: Remove the Apache package
      ansible.builtin.dnf:
        name: 
          - httpd
          - docker 
          - docker-client 
          - docker-client-latest 
          - docker-common 
          - docker-latest 
          - docker-latest-logrotate 
          - docker-logrotate 
          - docker-engine 
          - podman 
          - runc
        state: absent

    - name: Install packages
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: latest

    - name: Add the repo
      shell: dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo

    - name: Update the cache
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install containerd
      ansible.builtin.dnf:         
        name: containerd.io     
        state: latest

    - name: Configure containerd to use systemd to manage container
      shell: |
        containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/' | sed 's#sandbox_image = "registry.k8s.io/pause:.*"#sandbox_image = "registry.k8s.io/pause:3.9"#' | tee /etc/containerd/config.toml > /dev/null

    - name: Containerd systemd enable and restart
      ansible.builtin.systemd_service:
        state: restarted
        daemon_reload: true
        enabled: true
        name: containerd

    - name: Put SELinux in permissive mode, logging actions that would be blocked.
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    - name: Ensure SELinux is set to permissive mode
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: SELINUX=permissive

    - name: Add Kubernetes Repo
      ansible.builtin.yum_repository:
        name: Kubernetes
        description: Kubernetes
        file: external_repos
        baseurl: https://pkgs.k8s.io/core:/stable:/v1.34/rpm/
        enabled: yes
        gpgkey: https://pkgs.k8s.io/core:/stable:/v1.34/rpm/repodata/repomd.xml.key
        gpgcheck: true
        exclude: kubelet kubeadm kubectl cri-tools kubernetes-cni

    - name: Update the cache
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install packages
      ansible.builtin.dnf:
        name: 
          - kubelet 
          - kubeadm 
          - kubectl 
        state: latest
        disable_excludes: Kubernetes

    - name: Enable service kubelet 
      ansible.builtin.systemd_service:
        name: kubelet
        enabled: true


