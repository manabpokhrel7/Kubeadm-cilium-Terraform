- name: Installing ECK(Elastic Cloud on Kubernetes)
  hosts: control
  become: true
  tasks:
    - name: Copying the helm charts 
      copy:
        src: ELK-Stack
        dest: . 

    - name: Helm install ELK helm charts
      shell: |
        cd ELK-Stack 
        helm upgrade --install logstash ./logstash
        helm upgrade --install filebeat ./filebeat
        helm upgrade --install elasticsearch ./elasticsearch
